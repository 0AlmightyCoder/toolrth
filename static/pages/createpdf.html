<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Pdf</title>

    <link rel="stylesheet" href="/static/include/masterpage.css">
    <link rel="stylesheet" href="/static/stylesheet/common.css">

    <style>
        .custom-file-upload-button {
            display: block;
            width: 100%;
            height: 100px;
            line-height: 70px;
            padding: 10px 20px;
            text-align: center;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            margin-top: 10px;
        }

        #main-div {
            display: block;
            /* border: 1px solid blue; */
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        .content {
            width: 100%;
            margin: 20px auto;
            /* padding: 10px 20px; */
            caret-color: transparent;
            /* border: 1px solid black; */
        }

        #files-list {
            display: block;
            width: 100%;
            min-height: 100px;
            border: 1px solid black;
            margin-top: 10px;
            padding: 10px;
        }

        .selected-files {
            width: 120px;
            border: 1px solid #007BFF;
            padding: 10px;
            border-radius: 7px;
        }

        .view-selected-files{
            width: 120px;
            text-align: center;
            padding: 10px;
            background-color:#007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-file {
            color: red;
            font-size: small;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .content {
                width: 100%;
            }
        }
    </style>

</head>
<body>
    <!-- display header -->
    <div id="header"></div>
    <main class="page">
        <div id="main-div">
            <div>
                <h1 class="heading font-style">Choose files to create pdf</h1>
            </div>
            
            <div class="content">
                <input id="fileupload" type="file" multiple="true" name="select file" style="display: none;"> 
                <br />
    
                <!-- custom file upload button -->
                <label for="fileupload" class="custom-file-upload-button content font-style">
                    Choose Files
                </label>

                <br />
                <div>
                    <span id="file-count" class="content font-style">0 files selected</span>
                    <p>Selected Files</p>

                    <!-- display selected files here -->
                    <div id="files-list">

                        <!-- dynamic selected files button creation -->

                        <div class="selected-files flex">
                            <span>File Name</span>
                            <span style="color: red; font-size: small;" onclick="removeFile(this)">&#x2715</span>
                        </div>

                    </div>

                    <br />

                    <!-- view selected files -->
                    <div>
                        <span class="view-selected-files btn-font-style flex" onclick="viewSelectedFiles()">View Files</span>
                    </div>

                </div>
    
                <br />
    
                <!-- button -->
                 <span class="custom-file-upload-button content font-style" onclick="showSelectedFiles()">Create Pdf</span>
            </div>
        </div>
    </main>

    <!-- display footer -->
        <div id="footer"></div>

    <!-- loading script to load masterpage -->
    <script src="../include/masterpage.js"></script>

    <!-- loading custom script -->
    <script src="../js/custom.js"></script>

    <!-- loading createpdf script -->
    <script src="../js/createpdf.js"></script>

    <script>
        loadMasterPage();
    </script>
</body>
</html>
